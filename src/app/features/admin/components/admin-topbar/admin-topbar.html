<header
  class="w-full sticky top-0 z-50 bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-800/30 flex justify-end items-center px-8 py-4"
>
  <!-- Right Actions -->
  <div class="flex items-center gap-6">
    <!-- Notification Bell -->
    <button class="text-zinc-400 hover:text-white transition-colors relative">
      <span class="material-symbols-outlined">notifications</span>
      @if (notificationCount() > 0) {
        <span
          class="absolute top-0 right-0 w-2 h-2 bg-red-600 rounded-full border-2 border-zinc-950"
        ></span>
      }
    </button>

    <!-- Admin Info -->
    <div class="flex items-center gap-3 pl-6 border-l border-zinc-800">
      <div class="text-right">
        <p class="text-sm font-bold text-white">{{ adminName() }}</p>
        <p class="text-[10px] text-zinc-500 uppercase tracking-tighter">System Administrator</p>
      </div>
      <div class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 overflow-hidden">
        @if (adminAvatar()) {
          <img [src]="adminAvatar()" alt="Admin Avatar" class="w-full h-full object-cover" />
        } @else {
          <div class="w-full h-full flex items-center justify-center text-zinc-400">
            <span class="material-symbols-outlined">person</span>
          </div>
        }
      </div>
    </div>
  </div>
</header>
