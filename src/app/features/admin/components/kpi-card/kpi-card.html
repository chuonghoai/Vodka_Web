<div
  class="bg-zinc-900 p-5 rounded-xl border border-zinc-800 flex flex-col hover:border-zinc-700 transition-all"
>
  <span class="material-symbols-outlined mb-3" [class]="iconColor()">
    {{ icon() }}
  </span>
  <p class="text-[11px] font-medium uppercase tracking-widest text-zinc-500 mb-1">
    {{ label() }}
  </p>
  <div class="flex items-end justify-between">
    <h3 class="text-2xl font-black text-white">{{ value() }}</h3>
    @if (trend()) {
      <span
        class="text-xs font-bold flex items-center gap-0.5"
        [class.text-green-500]="trendDirection() === 'up'"
        [class.text-red-500]="trendDirection() === 'down'"
      >
        <span class="material-symbols-outlined text-[14px]">
          {{ trendDirection() === 'up' ? 'trending_up' : 'trending_down' }}
        </span>
        {{ trend() }}
      </span>
    }
  </div>
</div>
