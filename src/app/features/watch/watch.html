<div class="max-w-[1600px] mx-auto px-4 md:px-8 py-8 text-white animate-fade-in">

  <div class="w-full aspect-video bg-black border border-zinc-800 rounded-2xl flex items-center justify-center shadow-[0_0_40px_rgba(0,0,0,0.8)] relative overflow-hidden group mb-6">
    <div class="absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center">

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-24 h-24 text-red-600 mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">
        <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm14.024-.983a1.125 1.125 0 010 1.966l-5.603 3.113A1.125 1.125 0 019 15.113V8.887c0-.857.921-1.4 1.671-.983l5.603 3.113z" clip-rule="evenodd" />
      </svg>

      <p class="text-2xl font-black tracking-widest text-zinc-500 uppercase">Đang phát video stream...</p>
      <p class="text-zinc-400 mt-2">Nguồn phim ID: <span class="text-white font-bold">{{ movieId() }}</span></p>
    </div>
  </div>

  <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-zinc-900 p-6 rounded-2xl border border-zinc-800 gap-4">
    <div>
      <h2 class="text-2xl font-black text-white">Tập 1: Tiêu đề phim mẫu</h2>
      <p class="text-sm text-zinc-400 mt-1">Lượt xem: 124,500 • Phát hành: 2026</p>
    </div>

    <div class="flex gap-3 w-full md:w-auto">
      <button [routerLink]="['/movie', movieId()]" class="flex-1 md:flex-none bg-zinc-800 px-6 py-3 rounded-xl font-bold hover:bg-zinc-700 transition text-sm border border-zinc-700">
        Chi tiết phim
      </button>
      <button routerLink="/" class="flex-1 md:flex-none bg-zinc-800 px-6 py-3 rounded-xl font-bold hover:bg-zinc-700 transition text-sm border border-zinc-700">
        Trở về Home
      </button>
    </div>
  </div>

</div>
