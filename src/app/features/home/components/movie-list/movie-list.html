<div class="py-6">
  <h2 class="text-xl font-bold text-white mb-6 pl-4 border-l-4 border-red-600 flex items-center gap-2">
    {{ title() }}
  </h2>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 px-4">
    @for (m of movies(); track m.id) {
      <app-movie-card [movie]="m"></app-movie-card>
    }
  </div>

  <div class="flex justify-center items-center gap-2 mt-10 flex-wrap px-4">

    <button (click)="changePage.emit(1)"
            [disabled]="currentPage() === 1"
            class="w-10 h-10 rounded-full flex items-center justify-center text-white bg-zinc-800 hover:bg-red-500 disabled:opacity-30 disabled:hover:bg-zinc-800 disabled:cursor-not-allowed transition-colors shadow-lg shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5" /></svg>
    </button>

    <button (click)="changePage.emit(currentPage() - 1)"
            [disabled]="currentPage() === 1"
            class="w-10 h-10 rounded-full flex items-center justify-center text-white bg-zinc-800 hover:bg-red-500 disabled:opacity-30 disabled:hover:bg-zinc-800 disabled:cursor-not-allowed transition-colors shadow-lg shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
    </button>

    @for (page of pages(); track $index) {
      @if (page.value === null) {
        <span class="w-8 h-10 flex items-center justify-center text-zinc-500 font-bold tracking-widest">
          {{ page.label }}
        </span>
      } @else {
        <button (click)="changePage.emit(page.value)"
                [class.bg-red-600]="currentPage() === page.value"
                [class.bg-zinc-800]="currentPage() !== page.value"
                class="min-w-10 h-10 px-2 rounded-full flex items-center justify-center text-white font-bold hover:bg-red-500 transition-colors shadow-lg shrink-0">
          {{ page.label }}
        </button>
      }
    }

    <button (click)="changePage.emit(currentPage() + 1)"
            [disabled]="currentPage() === totalPages()"
            class="w-10 h-10 rounded-full flex items-center justify-center text-white bg-zinc-800 hover:bg-red-500 disabled:opacity-30 disabled:hover:bg-zinc-800 disabled:cursor-not-allowed transition-colors shadow-lg shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
    </button>

    <button (click)="changePage.emit(totalPages())"
            [disabled]="currentPage() === totalPages()"
            class="w-10 h-10 rounded-full flex items-center justify-center text-white bg-zinc-800 hover:bg-red-500 disabled:opacity-30 disabled:hover:bg-zinc-800 disabled:cursor-not-allowed transition-colors shadow-lg shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 4.5l7.5 7.5-7.5 7.5m6-15l7.5 7.5-7.5 7.5" /></svg>
    </button>

  </div>
</div>
