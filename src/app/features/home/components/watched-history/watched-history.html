<div class="bg-zinc-900/60 backdrop-blur rounded-xl p-6 border border-zinc-800 h-full">
  <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
    <span class="w-1.5 h-6 bg-red-600 rounded"></span>
    {{ title() }}
  </h3>

  <div class="flex flex-col gap-6">
    @for (m of movies(); track m.id) {
      <div class="flex gap-5 items-center group cursor-pointer hover:bg-zinc-800/80 p-2.5 -mx-2.5 rounded-xl transition-colors duration-300">

        <img [src]="m.posterUrl" [alt]="m.title" class="w-20 h-28 md:w-24 md:h-36 object-cover rounded-lg shadow-md group-hover:scale-105 transition-transform duration-300">

        <div class="flex-1 py-1">
          <h4 class="text-base md:text-lg font-bold text-white group-hover:text-red-500 transition-colors line-clamp-2">{{ m.title }}</h4>
          <p class="text-sm text-zinc-400 mt-2">{{ m.releaseYear }} • ⭐ {{ m.rating }}</p>

          <div class="mt-2.5">
            <span class="text-xs px-2.5 py-1 bg-zinc-800 rounded-md text-zinc-300 border border-zinc-700">{{ m.genre.split(',')[0] }}</span>
          </div>
        </div>

      </div>
    }
  </div>
</div>
