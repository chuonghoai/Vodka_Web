<div class="bg-zinc-900/60 backdrop-blur rounded-xl p-6 border border-zinc-800 h-full">
  <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
    <span class="w-1.5 h-6 bg-red-600 rounded"></span>
    {{ title() }}
  </h3>

  <div class="flex flex-col gap-6">
    @for (m of movies(); track m.id) {
      <div [routerLink]="['/movie', m.id]" class="flex gap-5 items-center group cursor-pointer hover:bg-zinc-800/80 p-2.5 -mx-2.5 rounded-xl transition-colors duration-300">

        <div class="relative w-20 h-28 md:w-24 md:h-36 shrink-0 rounded-lg overflow-hidden shadow-md">

          <img [src]="m.posterUrl" [alt]="m.title" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">

          <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 text-white drop-shadow-xl scale-90 group-hover:scale-100 transition-transform duration-300">
              <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm14.024-.983a1.125 1.125 0 010 1.966l-5.603 3.113A1.125 1.125 0 019 15.113V8.887c0-.857.921-1.4 1.671-.983l5.603 3.113z" clip-rule="evenodd" />
            </svg>
          </div>
        </div>

        <div class="flex-1 py-1">
          <h4 class="text-base md:text-lg font-bold text-white group-hover:text-red-500 transition-colors line-clamp-2">{{ m.title }}</h4>
          <p class="text-sm text-zinc-400 mt-2">{{ m.releaseYear }} • ⭐ {{ m.rating }}</p>

          <div class="mt-2.5 flex flex-wrap gap-1.5">
            @for (g of m.genre; track g.id) {
              <span class="text-xs px-2.5 py-1 bg-zinc-800 rounded-md text-zinc-300 border border-zinc-700">{{ g.name }}</span>
            }
          </div>
        </div>

      </div>
    }
  </div>
</div>
