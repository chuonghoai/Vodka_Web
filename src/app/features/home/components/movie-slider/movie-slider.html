<div class="py-6 relative group/slider">
  <h2 class="text-xl font-bold text-white mb-4 pl-4 border-l-4 border-red-600 flex items-center gap-2">
    {{ title() }}
  </h2>

  <button (click)="scrollLeft()" class="absolute left-0 top-[60%] -translate-y-1/2 bg-black/80 hover:bg-red-600 text-white p-3 rounded-r-lg z-10 opacity-0 group-hover/slider:opacity-100 transition-all duration-300 hidden md:block">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
  </button>

  <div #sliderContainer class="flex gap-4 overflow-x-auto pb-4 px-4 snap-x hide-scrollbar scroll-smooth">
    @for (m of movies(); track m.id) {
      <div class="min-w-[160px] md:min-w-[200px] snap-start">
        <app-movie-card [movie]="m"></app-movie-card>
      </div>
    }
  </div>

  <button (click)="scrollRight()" class="absolute right-0 top-[60%] -translate-y-1/2 bg-black/80 hover:bg-red-600 text-white p-3 rounded-l-lg z-10 opacity-0 group-hover/slider:opacity-100 transition-all duration-300 hidden md:block">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
  </button>
</div>
