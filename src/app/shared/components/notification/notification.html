<div class="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-3 pointer-events-none">

  @for (notif of notificationService.notifications(); track notif.id) {
    <div class="pointer-events-auto flex items-center gap-3 px-4 py-3 min-w-[320px] max-w-md bg-zinc-900 border border-zinc-700 rounded-xl shadow-2xl animate-slide-down relative overflow-hidden"
         [class.border-l-4]="true"
         [class.border-l-green-500]="notif.type === NotificationType.SUCCESS"
         [class.border-l-red-500]="notif.type === NotificationType.ERROR"
         [class.border-l-yellow-500]="notif.type === NotificationType.WARNING"
         [class.border-l-blue-500]="notif.type === NotificationType.INFO">

      <div class="shrink-0">
        @if (notif.type === NotificationType.SUCCESS) {
          <svg class="w-6 h-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        } @else if (notif.type === NotificationType.ERROR) {
          <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        } @else if (notif.type === NotificationType.WARNING) {
          <svg class="w-6 h-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        } @else {
          <svg class="w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" /></svg>
        }
      </div>

      <div class="flex-1 text-white text-sm font-medium pr-4">
        {{ notif.message }}
      </div>

      <button (click)="notificationService.remove(notif.id)" class="absolute top-1/2 -translate-y-1/2 right-3 p-1 rounded-md text-zinc-500 hover:text-white hover:bg-zinc-800 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>

    </div>
  }

</div>

<style>
  .animate-slide-down { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-100%); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
